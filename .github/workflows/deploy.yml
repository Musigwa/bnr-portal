name: Reusable SSH Deploy

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      project_name:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate .env file
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          # Exclude infrastructure-only secret prefixes (VPS_*, GITHUB_*) and any
          # key that isn't a valid POSIX uppercase variable name. This is the same
          # battle-tested pattern used across our other projects. VPS_* secrets are
          # repo-level SSH/host credentials; GITHUB_* are runner-injected tokens —
          # neither belong in the application env file.
          # Smart quoting: numerics/booleans unquoted, strings double-quoted so
          # Docker Compose parses special characters in passwords correctly.
          echo "$SECRETS_JSON" | jq -r '
            to_entries | .[] |
            select(
              (.key | test("^[A-Z][A-Z0-9_]*$")) and
              (.key | test("^(VPS_|GITHUB_)") | not)
            ) |
            if (.value | test("^([0-9]+|true|false)$")) then
              "\(.key)=\(.value)"
            else
              "\(.key)=\"\(.value)\""
            end
          ' > .env
          echo "NODE_ENV=production" >> .env
          # Derive NEXT_PUBLIC_API_URL from DOMAIN_ROOT — single source of truth for domain config
          APP_NAME="${{ github.event.repository.name }}"
          DOMAIN_ROOT=$(echo "$SECRETS_JSON" | jq -r '.DOMAIN_ROOT')
          echo "NEXT_PUBLIC_API_URL=\"https://api.${APP_NAME}.${DOMAIN_ROOT}\"" >> .env
          chmod 644 .env

      - name: Copy deploy script to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: ".github/scripts/deploy-blue-green.sh,.github/scripts/utils.sh,docker-compose.yml,.env"
          target: "/opt/deploy/${{ inputs.project_name }}"
          strip_components: 0

      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/deploy/${{ inputs.project_name }}
            chmod +x .github/scripts/deploy-blue-green.sh .github/scripts/utils.sh
            ./.github/scripts/deploy-blue-green.sh ${{ inputs.service_name }} ${{ github.sha }} ${{ github.event.repository.name }}
