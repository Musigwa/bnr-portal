name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      clean_infra:
        description: 'Wipe database and storage volumes before deploying'
        type: boolean
        default: false
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker.compose.yml'
      - '.github/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '!**.md'
      - '!**/.gitignore'

jobs:
  quality:
    name: Comprehensive Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node Environment
        uses: ./.github/actions/setup-node-env

      - name: Enforce Additive Migrations (No Data Loss)
        run: |
          if grep -r -i -E "DROP TABLE|DROP COLUMN" backend/prisma/migrations/ --include="*.sql" 2>/dev/null; then
            echo "DESTRUCTIVE MIGRATION DETECTED! Because this portal manages strict regulatory data, you are NOT ALLOWED to drop columns or tables. Migrations must be strictly additive. Deprecate columns in the application layer instead."
            exit 1
          fi

      - name: Verify All (Lint, Typecheck, Test, Build)
        run: pnpm verify:all

  detect-changes:
    needs: quality
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '!backend/**/*.md'
              - 'docker.compose.yml'
              - '.github/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            frontend:
              - 'frontend/**'
              - '!frontend/**/*.md'
              - 'docker.compose.yml'
              - '.github/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'

  clean-infrastructure:
    if: github.event.inputs.clean_infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wipe VPS infrastructure
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /opt/deploy/${{ github.event.repository.name }} || exit 0
            docker compose -f docker.compose.yml down -v --remove-orphans || true
            docker system prune -af --volumes || true

  build-backend:
    needs: [detect-changes]
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.backend == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build.yml
    with:
      context: .
      dockerfile: ./backend/Dockerfile
      image_name: ${{ github.repository }}-backend
    secrets: inherit

  build-frontend:
    needs: [detect-changes]
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.frontend == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build.yml
    with:
      context: .
      dockerfile: ./frontend/Dockerfile
      image_name: ${{ github.repository }}-frontend
    secrets: inherit

  deploy-backend:
    needs: [detect-changes, build-backend, clean-infrastructure]
    if: |
      always() &&
      needs.detect-changes.outputs.backend == 'true' &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.clean-infrastructure.result == 'success' || needs.clean-infrastructure.result == 'skipped')
    uses: ./.github/workflows/deploy.yml
    with:
      service_name: backend
      project_name: ${{ github.event.repository.name }}
    secrets: inherit

  deploy-frontend:
    needs: [detect-changes, build-frontend, deploy-backend]
    if: |
      always() &&
      needs.detect-changes.outputs.frontend == 'true' &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    uses: ./.github/workflows/deploy.yml
    with:
      service_name: frontend
      project_name: ${{ github.event.repository.name }}
    secrets: inherit
