name: Deploy Monorepo

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker.compose.yml'
      - '.github/workflows/**'
      - '.github/scripts/**'
      - '!**.md'
      - '!**/.gitignore'

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache TypeScript Build Info
        uses: actions/cache@v5
        with:
          path: |
            backend/tsconfig.tsbuildinfo
            frontend/tsconfig.tsbuildinfo
          key: ${{ runner.os }}-tsconfig-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-tsconfig-cache-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm -r postinstall

      - name: Quality Check (Parallel Lint & Typecheck)
        run: |
          pnpm --filter @bnr-portal/frontend lint & pid1=$!
          pnpm --filter @bnr-portal/frontend typecheck & pid2=$!
          pnpm --filter @bnr-portal/backend lint & pid3=$!
          pnpm --filter @bnr-portal/backend typecheck & pid4=$!
          
          # Wait for all processes and propagate failure if any exit code is non-zero
          wait $pid1 && wait $pid2 && wait $pid3 && wait $pid4



  detect-changes:
    needs: quality
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker.compose.yml'
              - '.github/**'
            frontend:
              - 'frontend/**'
              - 'docker.compose.yml'
              - '.github/**'

  deploy-backend:
    needs: [quality, detect-changes]
    if: needs.detect-changes.outputs.backend == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/deploy.yml
    with:
      service_name: backend
      context: ./backend
      image_name: ${{ github.repository }}-backend
      project_name: ${{ github.event.repository.name }}
    secrets: inherit

  deploy-frontend:
    needs: [quality, detect-changes]
    # Run if frontend changed
    if: needs.detect-changes.outputs.frontend == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/deploy.yml
    with:
      service_name: frontend
      context: ./frontend
      image_name: ${{ github.repository }}-frontend
      project_name: ${{ github.event.repository.name }}
    secrets: inherit
