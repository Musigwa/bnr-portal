services:
  # ==========================================
  # DATABASE
  # ==========================================
  postgres:
    image: postgres:16-alpine
    profiles: ['development', 'production']
    env_file:
      - .env.${NODE_ENV}
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
    # The right side (:5432) is the port inside the container and is FIXED because Postgres always listens on 5432.
    # The left side (${DB_PORT}) is the port on your host (Mac/PC/VPS) and you can set it in .env file.
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bnr_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # OBJECT STORAGE (MINIO)
  # ==========================================
  minio:
    image: minio/minio:latest
    profiles: ['development', 'production']
    env_file:
      - .env.${NODE_ENV}
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - bnr_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    profiles: ['development', 'production']
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env.${NODE_ENV}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-admin} ${MINIO_SECRET_KEY:-admin123};
      /usr/bin/mc mb myminio/${MINIO_BUCKET_NAME:-bnr-portal-documents} --ignore-existing;
      /usr/bin/mc anonymous set public myminio/${MINIO_BUCKET_NAME:-bnr-portal-documents};
      exit 0;
      "
    networks:
      - bnr_network

  # ==========================================
  # BACKEND - DEVELOPMENT
  # ==========================================
  backend-dev:
    profiles: ['development']
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.development
    ports:
    # For apps (frontend and backend) in dev, we use the same port on both sides because we can tell the app inside to listen on it!
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - CONTAINER_ENV=true
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      # We hardcode 5432 here because that is the port used INSIDE the Docker network to talk to Postgres.
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - PORT=${BACKEND_PORT}
      - MINIO_ENDPOINT=minio
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bnr_network

  # ==========================================
  # BACKEND - PRODUCTION
  # ==========================================
  backend:
    profiles: ['production']
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/${APP_NAME}-backend:${IMAGE_TAG}
    env_file:
      - .env.${NODE_ENV}
    ports:
    # Production apps use dynamic host ports (0) to avoid conflicts and enable Zero Downtime (Blue/Green friendly)!
      - "0:${BACKEND_PORT}"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-admin123}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-bnr-portal-documents}
    depends_on:
      - postgres
    networks:
      - bnr_network
      - observability-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:$$BACKEND_PORT/health/liveness || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 5

  # ==========================================
  # FRONTEND - DEVELOPMENT
  # ==========================================
  frontend-dev:
    profiles: ['development']
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    env_file:
      - .env.development
    ports:
    # Map host port from env to container port 3000 (default for Next.js dev server)
      - "${NEXT_FRONTEND_PORT}:3000"
    environment:
      - NODE_ENV=development
    # Your browser accesses the backend from the host (Mac), so we use localhost:${BACKEND_PORT}.
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend-dev
    networks:
      - bnr_network

  # ==========================================
  # FRONTEND - PRODUCTION
  # ==========================================
  frontend:
    profiles: ['production']
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/${APP_NAME}-frontend:${IMAGE_TAG}
    env_file:
      - .env.${NODE_ENV}
    ports:
    # Production apps use dynamic host ports (0) to avoid conflicts and enable Zero Downtime (Blue/Green friendly)!
      - "0:${NEXT_FRONTEND_PORT}"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - PORT=${NEXT_FRONTEND_PORT}
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    networks:
      - bnr_network
      - observability-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:$$PORT/ || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:

networks:
  bnr_network:
    driver: bridge
  observability-network:
    external: true