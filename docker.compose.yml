services:
  # ==========================================
  # DATABASE
  # ==========================================
  postgres:
    image: postgres:16-alpine
    profiles: ['development', 'production']
    env_file:
      - .env.${NODE_ENV}
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
    # The right side (:5432) is the port inside the container and is FIXED because Postgres always listens on 5432.
    # The left side (${DB_PORT}) is the port on your host (Mac/PC/VPS) and you can set it in .env file.
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bnr_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # BACKEND - DEVELOPMENT
  # ==========================================
  backend-dev:
    profiles: ['development']
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.development
    ports:
    # For apps (frontend and backend) in dev, we use the same port on both sides because we can tell the app inside to listen on it!
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - CONTAINER_ENV=true
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      # We hardcode 5432 here because that is the port used INSIDE the Docker network to talk to Postgres.
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - PORT=${BACKEND_PORT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bnr_network

  # ==========================================
  # BACKEND - PRODUCTION
  # ==========================================
  backend:
    profiles: ['production']
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/${APP_NAME}-backend:${IMAGE_TAG}
    env_file:
      - .env.${NODE_ENV}
    ports:
    # Production apps use dynamic host ports (0) to avoid conflicts and enable Zero Downtime (Blue/Green friendly)!
      - "0:${BACKEND_PORT}"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      - postgres
    networks:
      - bnr_network
      - observability-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:$$BACKEND_PORT/health/liveness || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 5

  # ==========================================
  # FRONTEND - DEVELOPMENT
  # ==========================================
  frontend-dev:
    profiles: ['development']
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    env_file:
      - .env.development
    ports:
    # Dev apps use the same port on both sides because we can tell the app inside to listen on it!
      - "${NEXT_FRONTEND_PORT}:${NEXT_FRONTEND_PORT}"
    environment:
      - NODE_ENV=development
    # Your browser accesses the backend from the host (Mac), so we use localhost:${BACKEND_PORT}.
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend-dev
    networks:
      - bnr_network

  # ==========================================
  # FRONTEND - PRODUCTION
  # ==========================================
  frontend:
    profiles: ['production']
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/${APP_NAME}-frontend:${IMAGE_TAG}
    env_file:
      - .env.${NODE_ENV}
    ports:
    # Production apps use dynamic host ports (0) to avoid conflicts and enable Zero Downtime (Blue/Green friendly)!
      - "0:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - PORT=3000
    depends_on:
      - backend
    networks:
      - bnr_network
      - observability-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  bnr_network:
    driver: bridge
  observability-network:
    external: true